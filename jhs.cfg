USER =: ''       NB. no JHS password — app handles its own auth
PASS =: ''
TIPX =: 'ModelScope/'

load '~/jdev/dataview/src/db.ijs'
db_open_jhs_ ''
load '~/jdev/dataview/src/auth.ijs'
load '~/jdev/dataview/src/csv_util.ijs'
load '~/jdev/dataview/src/preprocess.ijs'
load '~/jdev/dataview/src/pca.ijs'
load '~/jdev/dataview/src/mslogin.ijs'
load '~/jdev/dataview/src/msdashboard.ijs'

NB. Do not edit past this line
)
