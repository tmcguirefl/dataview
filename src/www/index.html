<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModelScope-J</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    #app { max-width: 480px; margin: 80px auto; padding: 0 1rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
    .subtitle { color: #64748b; margin-bottom: 2rem; font-size: 0.9rem; }
    .card { background: #1e2230; border: 1px solid #2d3348; border-radius: 10px; padding: 1.5rem; }
    .card h2 { font-size: 1.1rem; margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; margin-top: 0.75rem; }
    input { width: 100%; padding: 0.5rem 0.75rem; background: #0f1117; border: 1px solid #2d3348;
            border-radius: 6px; color: #e2e8f0; font-size: 0.95rem; outline: none; }
    input:focus { border-color: #6366f1; }
    button { width: 100%; margin-top: 1.25rem; padding: 0.6rem; background: #6366f1;
             color: #fff; border: none; border-radius: 6px; font-size: 0.95rem;
             cursor: pointer; font-weight: 600; }
    button:hover { background: #4f52cc; }
    .toggle { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #64748b; }
    .toggle a { color: #818cf8; cursor: pointer; text-decoration: none; }
    .error { background: #3b1a1a; border: 1px solid #7f1d1d; border-radius: 6px;
             padding: 0.5rem 0.75rem; margin-top: 0.75rem; font-size: 0.85rem; color: #fca5a5; }
    .hidden { display: none; }
    #dashboard { display: none; }
    #dashboard h2 { margin-bottom: 1rem; }
    .user-info { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .datasets-placeholder { color: #475569; font-size: 0.85rem; text-align: center;
                            padding: 2rem; border: 1px dashed #2d3348; border-radius: 8px; }
    .logout { background: #1e2230; border: 1px solid #2d3348; color: #94a3b8;
              width: auto; padding: 0.35rem 0.9rem; font-size: 0.8rem; font-weight: 500; float: right; }
    .logout:hover { background: #2d3348; color: #e2e8f0; }
  </style>
</head>
<body>
  <div id="app">
    <h1>ModelScope<span style="color:#6366f1">-J</span></h1>
    <p class="subtitle">PCA &amp; data analysis — powered by the J language</p>

    <!-- Auth panel -->
    <div id="auth-panel" class="card">
      <h2 id="auth-title">Sign in</h2>
      <div id="auth-error" class="error hidden"></div>
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" placeholder="your username">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="your password">
      <button id="auth-btn">Sign in</button>
      <p class="toggle">
        <span id="toggle-msg">Don't have an account?</span>
        <a id="toggle-link">Register</a>
      </p>
    </div>

    <!-- Dashboard (shown after login) -->
    <div id="dashboard" class="card">
      <button class="logout" id="logout-btn">Sign out</button>
      <h2>Dashboard</h2>
      <p class="user-info" id="dash-user"></p>
      <div class="datasets-placeholder">
        No datasets yet.<br>Upload a CSV to get started (coming in Phase 2).
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
